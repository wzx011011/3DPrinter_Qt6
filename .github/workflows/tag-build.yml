name: Tag Build (Windows)

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
      ORCA_DEPS_ROOT: ${{ github.workspace }}/third_party/OrcaSlicer/deps/build/OrcaSlicer_dep
      DEPS_PREFIX: ${{ github.workspace }}/third_party/OrcaSlicer/deps/build/OrcaSlicer_dep/usr/local
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed/x64-windows
      PAHO_MQTT_PREFIX: ${{ github.workspace }}/third_party/paho-mqtt-prefix
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.3.0"
          useLocalCache: true
          useCloudCache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Qt 6.10.0
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.0"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          modules: "qtshadertools"

      - name: Compute OrcaSlicer deps cache key
        shell: pwsh
        run: |
          $hash = git -C third_party/OrcaSlicer ls-files deps | git -C third_party/OrcaSlicer hash-object --stdin
          "ORCA_DEPS_CACHE_KEY=windows-orcaslicer-deps-$hash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore OrcaSlicer deps cache
        id: restore-orca-deps
        uses: actions/cache/restore@v4
        with:
          path: third_party/OrcaSlicer/deps/build/OrcaSlicer_dep
          key: ${{ env.ORCA_DEPS_CACHE_KEY }}

      - name: Build OrcaSlicer deps
        if: steps.restore-orca-deps.outputs.cache-hit != 'true'
        shell: pwsh
        working-directory: third_party/OrcaSlicer
        run: |
          choco install strawberryperl -y --no-progress
          .\build_release_vs.bat deps

      - name: Save OrcaSlicer deps cache
        if: steps.restore-orca-deps.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: third_party/OrcaSlicer/deps/build/OrcaSlicer_dep
          key: ${{ env.ORCA_DEPS_CACHE_KEY }}

      - name: Verify dependency prefix
        shell: pwsh
        run: |
          $required = @(
            "$env:DEPS_PREFIX/lib/cmake/Boost-1.84.0",
            "$env:DEPS_PREFIX/lib/libgmp-10.lib",
            "$env:DEPS_PREFIX/lib/libmpfr-4.lib",
            "$env:DEPS_PREFIX/include/libnoise/noise.h"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing dependency path: $path"
            }
          }

      - name: Restore Paho MQTT cache
        id: restore-paho-mqtt
        uses: actions/cache/restore@v4
        with:
          path: third_party/paho-mqtt-prefix
          key: windows-paho-mqtt-c-1.3.16-static-md

      - name: Build Paho MQTT dependency
        if: steps.restore-paho-mqtt.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch v1.3.16 https://github.com/eclipse-paho/paho.mqtt.c.git build/paho.mqtt.c
          cmake -S build/paho.mqtt.c -B build/paho-mqtt -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:PAHO_MQTT_PREFIX" `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL `
            -DPAHO_WITH_SSL=ON `
            -DPAHO_HIGH_PERFORMANCE=ON `
            -DPAHO_BUILD_SHARED=OFF `
            -DPAHO_BUILD_STATIC=ON `
            -DPAHO_ENABLE_TESTING=OFF `
            -DOPENSSL_ROOT_DIR="$env:DEPS_PREFIX" `
            -DOPENSSL_INCLUDE_DIR="$env:DEPS_PREFIX/include" `
            -DOPENSSL_SSL_LIBRARY="$env:DEPS_PREFIX/lib/libssl.lib" `
            -DOPENSSL_CRYPTO_LIBRARY="$env:DEPS_PREFIX/lib/libcrypto.lib"
          cmake --build build/paho-mqtt --config Release --target install --verbose

      - name: Save Paho MQTT cache
        if: steps.restore-paho-mqtt.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: third_party/paho-mqtt-prefix
          key: windows-paho-mqtt-c-1.3.16-static-md

      - name: Verify Paho MQTT dependency
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:PAHO_MQTT_PREFIX/include/MQTTAsync.h")) {
            throw "Missing Paho MQTT header after build"
          }
          if (-not (Test-Path "$env:PAHO_MQTT_PREFIX/lib/paho-mqtt3a-static.lib")) {
            throw "Missing Paho MQTT static library after build"
          }

      - name: Configure (CMake)
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_LIBSLIC3R=ON `
            -DLIBSLIC3R_FROM_SOURCE=ON `
            -DOWZX_QML_GUI=ON `
            -DDEPS_PREFIX="$env:DEPS_PREFIX" `
            -DVCPKG_INSTALLED_DIR="$env:VCPKG_INSTALLED_DIR" `
            -DPAHO_MQTT_PREFIX="$env:PAHO_MQTT_PREFIX"

      - name: Build
        run: cmake --build build --config Release --target OWzxSlicer --verbose

      - name: Collect failure diagnostics
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path "build/.ninja_log") {
            Copy-Item "build/.ninja_log" "build/ninja_log.txt" -Force
          }
          if (Test-Path "build/CMakeFiles/CMakeError.log") {
            Copy-Item "build/CMakeFiles/CMakeError.log" "build/CMakeError.log" -Force
          }
          if (Test-Path "build/CMakeFiles/CMakeOutput.log") {
            Copy-Item "build/CMakeFiles/CMakeOutput.log" "build/CMakeOutput.log" -Force
          }

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ env.TAG_NAME }}
          path: |
            build/ninja_log.txt
            build/CMakeError.log
            build/CMakeOutput.log
          if-no-files-found: warn

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OWzxSlicer-${{ env.TAG_NAME }}-windows
          path: |
            build/OWzxSlicer.exe
            build/*.dll
            build/en.qm
            build/zh_CN.qm
          if-no-files-found: warn

      - name: Package release zip
        shell: pwsh
        run: |
          $outDir = "build/release"
          New-Item -Path $outDir -ItemType Directory -Force | Out-Null
          Copy-Item "build/OWzxSlicer.exe" $outDir -Force -ErrorAction SilentlyContinue
          Copy-Item "build/*.dll" $outDir -Force -ErrorAction SilentlyContinue
          Copy-Item "build/en.qm" $outDir -Force -ErrorAction SilentlyContinue
          Copy-Item "build/zh_CN.qm" $outDir -Force -ErrorAction SilentlyContinue
          windeployqt --release --qmldir src "$outDir/OWzxSlicer.exe"
          Remove-Item "$outDir/TK*.dll" -Force -ErrorAction SilentlyContinue
          Remove-Item "$outDir/cr_tpms_library.dll" -Force -ErrorAction SilentlyContinue
          $zipPath = "build/OWzxSlicer-${{ env.TAG_NAME }}-windows.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$outDir/*" -DestinationPath $zipPath

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: OWzxSlicer-${{ env.TAG_NAME }}-windows-zip
          path: build/OWzxSlicer-${{ env.TAG_NAME }}-windows.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          fail_on_unmatched_files: false
          overwrite_files: true
          files: |
            build/OWzxSlicer-${{ env.TAG_NAME }}-windows.zip
